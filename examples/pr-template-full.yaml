# Full template — demonstrates every supported field.
# Copy and trim down to what you actually need.
#
# Available placeholders for `title` and `description`:
#   {term}        — the search term passed to the CLI
#   {replacement} — the replacement string
#   {files_table} — Markdown table of modified files and changed lines
#   {timestamp}   — ISO 8601 creation timestamp

title: "chore: replace {term} with {replacement}"

description: |
  ## Summary

  Automated replacement generated by `gh-search-replace`.

  | | |
  |---|---|
  | **Search term** | `{term}` |
  | **Replacement** | `{replacement}` |

  ### Files modified

  {files_table}

  ---
  *Generated on {timestamp}*

# Alternatively, point to an external Markdown file (path relative to this template):
# descriptionFile: ./body.md

labels:
  - automated
  - chore

assignees:
  - your-github-username

# Individual reviewers (GitHub usernames)
reviewers:
  - reviewer-username

# Team reviewers (team slugs within your org)
teamReviewers:
  - your-team-slug

# Milestone: provide a title (string) or a milestone number (integer).
# If a title is given it will be looked up by name; unmatched titles are warned and skipped.
milestone: "v1.0.0"

# Open as a draft PR (overrides the --draft CLI flag when set)
draft: false

# GitHub Projects v2 — not yet supported; listed here for forward-compatibility.
# projects:
#   - "My Project Board"
